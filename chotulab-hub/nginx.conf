# ── Redirect bare domain → www (permanent 301) ───────────────────
# Handles: http://chotulab.com and https://chotulab.com (after Traefik TLS)
server {
    listen 80;
    server_name chotulab.com;
    return 301 $scheme://www.chotulab.com$request_uri;
}

# ── Main landing page server ──────────────────────────────────────
server {
    listen 80 default_server;
    server_name www.chotulab.com _;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript
                    application/json image/svg+xml font/woff2;

    # Long-cache for fingerprinted static assets
    location ~* \.(css|js|woff2?|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # All other routes → index.html (SPA-safe)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "geolocation=(self), camera=(), mic=()"  always;
}
