name: ShelfLife AI — CI

# Runs on every feature branch push and on PRs targeting main.
# Does NOT run on push to main (deploy.yml handles that).

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  # ── 2. Test ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shelflife_test
          POSTGRES_USER: shelflife
          POSTGRES_PASSWORD: shelflife
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 15s
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://shelflife:shelflife@localhost:5432/shelflife_test
      REDIS_URL: redis://localhost:6379/0
      API_KEY: test-key-ci
      MLFLOW_TRACKING_URI: sqlite:////tmp/mlflow.db
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run python -m db.seed
      - name: Train models
        timeout-minutes: 15
        run: uv run python -m mlops.train_pipeline
        env:
          PYTHONIOENCODING: utf-8
      - run: uv run pytest tests/ -v --tb=short

  # ── 3. Docker build smoke-test (no push) ──────────────────────────
  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t shelflife-api:ci .
      - name: Build Dashboard image
        run: docker build -f Dockerfile.dashboard -t shelflife-dashboard:ci .
