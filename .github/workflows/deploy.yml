name: ShelfLife AI — Deploy to Production

# Push to main → build + deploy (lint/test already passed on feature branch).
# Manual dispatch → optionally run lint+test, then build + deploy.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GHCR_TOKEN              — GitHub PAT (scope: write:packages)
#   COOLIFY_TOKEN           — Coolify API token (Profile → Keys & Tokens)
#   COOLIFY_API_WEBHOOK     — Coolify deploy webhook for the API service
#   COOLIFY_DASH_WEBHOOK    — Coolify deploy webhook for the Dashboard service
#   COOLIFY_LANDING_WEBHOOK — Coolify deploy webhook for the ChotuLab landing page

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build and deploy"
        required: true
        default: "main"
      run_tests:
        description: "Run lint + tests before building"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── 1. Lint (manual dispatch with run_tests=true only) ───────────
  lint:
    name: Lint
    if: github.event_name == 'workflow_dispatch' && inputs.run_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  # ── 2. Test (manual dispatch with run_tests=true only) ───────────
  test:
    name: Test
    if: github.event_name == 'workflow_dispatch' && inputs.run_tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shelflife_test
          POSTGRES_USER: shelflife
          POSTGRES_PASSWORD: shelflife
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 15s
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://shelflife:shelflife@localhost:5432/shelflife_test
      REDIS_URL: redis://localhost:6379/0
      API_KEY: test-key-ci
      MLFLOW_TRACKING_URI: sqlite:////tmp/mlflow.db
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run python -m db.seed
      - name: Train models
        timeout-minutes: 15
        run: uv run python -m mlops.train_pipeline
        env:
          PYTHONIOENCODING: utf-8
      - run: uv run pytest tests/ -v --tb=short

  # ── 3. Build & Push Docker images to GHCR ───────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always() && !failure() && !cancelled()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/shelflife-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Dashboard image metadata
        id: meta-dash
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/shelflife-dashboard
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: ${{ steps.meta-dash.outputs.tags }}
          labels: ${{ steps.meta-dash.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy via Coolify webhooks ──────────────────────────────
  deploy:
    name: Deploy to Hetzner via Coolify
    runs-on: ubuntu-latest
    needs: build
    # success() (the default) evaluates the FULL upstream chain: lint → test → build.
    # When lint/test are skipped on a push event, success() returns false and deploy
    # gets skipped too — even though build passed. Using the same guard as build fixes it.
    if: always() && !failure() && !cancelled()
    steps:
      - name: Trigger Coolify — API service
        env:
          WEBHOOK: ${{ secrets.COOLIFY_API_WEBHOOK }}
          TOKEN:   ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl --silent --show-error --fail -X POST "$WEBHOOK" \
              -H "Authorization: Bearer $TOKEN"
            echo "✓ API deploy triggered"
          else
            echo "COOLIFY_API_WEBHOOK not set — skipping"
          fi

      - name: Trigger Coolify — Dashboard service
        env:
          WEBHOOK: ${{ secrets.COOLIFY_DASH_WEBHOOK }}
          TOKEN:   ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl --silent --show-error --fail -X POST "$WEBHOOK" \
              -H "Authorization: Bearer $TOKEN"
            echo "✓ Dashboard deploy triggered"
          else
            echo "COOLIFY_DASH_WEBHOOK not set — skipping"
          fi

      - name: Trigger Coolify — Landing page (www.chotulab.com)
        env:
          WEBHOOK: ${{ secrets.COOLIFY_LANDING_WEBHOOK }}
          TOKEN:   ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl --silent --show-error --fail -X POST "$WEBHOOK" \
              -H "Authorization: Bearer $TOKEN"
            echo "✓ Landing page deploy triggered"
          else
            echo "COOLIFY_LANDING_WEBHOOK not set — skipping"
          fi

      - name: Deployment summary
        run: |
          echo "Deployed to production"
          echo "  Ref:    ${{ inputs.ref || github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Actor:  ${{ github.actor }}"
