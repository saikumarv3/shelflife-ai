name: ShelfLife AI — Deploy to Production

# Runs ONLY on push to main (not PRs).
# Builds Docker images, pushes to GitHub Container Registry (GHCR),
# then triggers Coolify to redeploy the updated images.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GHCR_TOKEN              — GitHub Personal Access Token (scope: write:packages)
#   COOLIFY_API_WEBHOOK     — Coolify webhook URL for the API service
#   COOLIFY_DASH_WEBHOOK    — Coolify webhook URL for the Dashboard service

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  # Replace with your GitHub username (lowercase)
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  # ── 2. Test ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shelflife_test
          POSTGRES_USER: shelflife
          POSTGRES_PASSWORD: shelflife
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 15s
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://shelflife:shelflife@localhost:5432/shelflife_test
      REDIS_URL: redis://localhost:6379/0
      API_KEY: test-key-ci
      MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --all-groups
      - run: uv run python -m db.seed
      - name: Train models
        timeout-minutes: 15
        run: uv run python -m mlops.train_pipeline
        env:
          PYTHONIOENCODING: utf-8
      - run: uv run pytest tests/ -v --tb=short

  # ── 3. Build & Push Docker images to GHCR ─────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.meta-api.outputs.tags }}
      dash_image: ${{ steps.meta-dash.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # API image metadata (tags + labels)
      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/shelflife-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Dashboard image metadata
      - name: Dashboard image metadata
        id: meta-dash
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/shelflife-dashboard
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Build and push API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Dashboard image
      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: ${{ steps.meta-dash.outputs.tags }}
          labels: ${{ steps.meta-dash.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy via Coolify webhooks ────────────────────────────
  deploy:
    name: Deploy to Hetzner via Coolify
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Trigger Coolify — API service
        run: |
          curl --silent --show-error --fail \
            -X GET "${{ secrets.COOLIFY_API_WEBHOOK }}"

      - name: Trigger Coolify — Dashboard service
        run: |
          curl --silent --show-error --fail \
            -X GET "${{ secrets.COOLIFY_DASH_WEBHOOK }}"

      - name: Deployment summary
        run: |
          echo "✅ Deployed to production"
          echo "   Commit: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Actor:  ${{ github.actor }}"
