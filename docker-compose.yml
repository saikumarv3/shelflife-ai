services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shelflife
      POSTGRES_USER: shelflife
      POSTGRES_PASSWORD: shelflife
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U shelflife
      interval: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    ports:
      - "5001:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: "sqlite:///mlflow/mlflow.db"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: "/mlflow/artifacts"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  mlflow_data:
