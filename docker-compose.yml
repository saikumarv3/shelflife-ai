services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shelflife
      POSTGRES_USER: shelflife
      POSTGRES_PASSWORD: shelflife
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U shelflife
      interval: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      retries: 5
      start_period: 5s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    ports:
      - "5001:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: "sqlite:///mlflow/mlflow.db"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: "/mlflow/artifacts"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      retries: 5
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://shelflife:shelflife@postgres:5432/shelflife"
      REDIS_URL: "redis://redis:6379/0"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      API_KEY: "shelflife-dev-key-2024"
      API_WORKERS: "2"
      CORS_ORIGINS: "http://localhost:8501,http://dashboard:8501,https://www.chotulab.com,https://chotulab.com"
    volumes:
      - model_artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 5
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: "postgresql://shelflife:shelflife@postgres:5432/shelflife"
      REDIS_URL: "redis://redis:6379/0"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  mlflow_data:
  model_artifacts:
